<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RPG Escolar</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:30px;
}

input{
  padding:10px;
  width:300px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px 15px;
  margin:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#22c55e;
}

.card{
  margin-top:30px;
  background:#1f2937;
  padding:20px;
  border-radius:12px;
  display:inline-block;
}

.bar{
  height:12px;
  background:#374151;
  border-radius:10px;
  margin-top:10px;
}

.fill{
  height:100%;
  background:#22c55e;
}
</style>
</head>

<body>

<h1>⚔️ RPG Escolar</h1>

<p>Digite seu nome:</p>

<input id="busca" placeholder="Seu nome completo">
<br>
<button onclick="buscar()">Buscar</button>

<div id="resultado"></div>

<script>

let dados=[];

async function carregar(){
  const r=await fetch("dados.json?"+Date.now());
  dados=await r.json();
}

carregar();

function buscar(){

  const nome = busca.value.toLowerCase();

  const aluno = dados.find(a =>
    a.nome.toLowerCase().includes(nome)
  );

  if(!aluno){
    resultado.innerHTML="<p>Aluno não encontrado</p>";
    return;
  }

  const pct = (aluno.xp/1000)*100;

  resultado.innerHTML = `
    <div class="card">
      <h2>${aluno.nome}</h2>
      <p>${aluno.ano}º Ano</p>

      <h3>Nível ${aluno.nivel}</h3>

      <div class="bar">
        <div class="fill" style="width:${pct}%"></div>
      </div>

      <p>${aluno.xp} / 1000 XP</p>
    </div>
  `;
}

</script>

</body>
</html>
