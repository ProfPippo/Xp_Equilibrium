<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RPG DE GEOGRAFIA 2026</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:30px;
}

/* frase destaque */
.frase{
  font-size:32px;
  font-weight:bold;
  color:#facc15;
  text-shadow:0 0 10px #facc15;
}

/* input */
input{
  padding:10px;
  width:300px;
  border-radius:8px;
  border:none;
}

/* container card + imagem */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  margin-top:20px;
}

/* card */
.card{
  padding:20px;
  border-radius:12px;
  min-width:250px;
}

/* níveis */
.nivel1{ background:#1f2937; } 
.nivel2{ background:#1e40af; } 
.nivel3{ background:#7e22ce; } 
.nivel4{ background:#ca8a04; } 
.nivel5{ background:#FFD700; } 

/* foto */
.foto{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid white;
}

/* especial */
.especial{
  width:140px;
  animation: flutuar 2s infinite ease-in-out;
}

@keyframes flutuar{
  0%{ transform:translateY(0); }
  50%{ transform:translateY(-10px); }
  100%{ transform:translateY(0); }
}

/* barra XP */
.bar{
  height:12px;
  background:#374151;
  border-radius:10px;
  margin-top:10px;
}

.fill{
  height:100%;
  background:#22c55e;
}
</style>
</head>

<body>

<h1>⚔️ RPG DE GEOGRAFIA 2026 ⚔️</h1>

<p class="frase">HORA DE FARMAR SUA AURA!!!!!</p>

<p>Digite seu nome:</p>

<input id="busca" placeholder="Digite pelo menos 2 letras">

<div id="resultado"></div>

<script>

/* =========================
   VARIÁVEIS
========================= */
let dados = [];
const resultado = document.getElementById("resultado");
const inputBusca = document.getElementById("busca");

/* =========================
   NORMALIZAR TEXTO
========================= */
function normalizar(txt){
  return txt
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

/* =========================
   CARREGAR DADOS
========================= */
async function carregar(){
  try{
    const r = await fetch("dados.json?nocache=" + new Date().getTime());
    dados = await r.json();
  }catch(e){
    resultado.innerHTML = "<h2>Erro ao carregar dados 😢</h2>";
    console.error(e);
  }
}

carregar();

/* =========================
   BUSCA
========================= */
function buscar(){

  const termo = normalizar(inputBusca.value);

  if(termo.length < 2){
    resultado.innerHTML = "<p>Digite pelo menos 2 letras...</p>";
    return;
  }

  const encontrados = dados.filter(a =>
    normalizar(a.nome).includes(termo)
  );

  if(encontrados.length === 0){
    resultado.innerHTML = "<p>Aluno não encontrado</p>";
    return;
  }

  mostrarResultados(encontrados);
}

/* =========================
   MOSTRAR RESULTADOS
========================= */
function mostrarResultados(lista){

  resultado.innerHTML = "";

  lista.forEach(aluno => {

    const pct = (aluno.xp/1000)*100;

    let classeNivel = "nivel1";

    if(aluno.nivel >= 5){
      classeNivel = "nivel5";
    } else if(aluno.nivel >= 4){
      classeNivel = "nivel4";
    } else if(aluno.nivel >= 3){
      classeNivel = "nivel3";
    } else if(aluno.nivel >= 2){
      classeNivel = "nivel2";
    }

    let imagemEspecial = "";

    if(aluno.nivel >= 2 && aluno.especial){
      imagemEspecial = `<img src="${aluno.especial}" class="especial">`;
    }

    resultado.innerHTML += `
      <div class="container">

        ${imagemEspecial}

        <div class="card ${classeNivel}">
          
          <img src="${aluno.foto || 'https://via.placeholder.com/100'}" class="foto">
          
          <h2>${aluno.nome}</h2>
          <p>${aluno.ano}º Ano</p>

          <h3>Nível ${aluno.nivel}</h3>

          <div class="bar">
            <div class="fill" style="width:${pct}%"></div>
          </div>

          <p>${aluno.xp} / 1000 XP</p>
        </div>

      </div>
    `;
  });
}

/* =========================
   EVENTO DE DIGITAÇÃO
========================= */
inputBusca.addEventListener("input", buscar);

</script>

</body>
</html>
