<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RPG DE GEOGRAFIA 2026</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:30px;
}

/* frase destaque */
.frase{
  font-size:32px;
  font-weight:bold;
  color:#facc15;
  text-shadow:0 0 10px #facc15;
}

/* input */
input{
  padding:10px;
  width:300px;
  border-radius:8px;
  border:none;
}

/* botão */
button{
  padding:10px 15px;
  margin:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#22c55e;
}

/* container card + imagem */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  margin-top:30px;
}

/* card base */
.card{
  padding:20px;
  border-radius:12px;
  display:inline-block;
  color:white;
  min-width:250px;
}

/* cores por nível */
.nivel1{ background:#1f2937; } 
.nivel2{ background:#1e40af; } 
.nivel3{ background:#7e22ce; } 
.nivel4{ background:#ca8a04; } 
.nivel5{ background:#FFD700; } 

/* FOTO DO ALUNO */
.foto{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:10px;
  border:3px solid white;
}

/* imagem especial */
.especial{
  width:200px;
  animation: flutuar 2s infinite ease-in-out;
}

/* animação */
@keyframes flutuar{
  0%{ transform:translateY(0px); }
  50%{ transform:translateY(-10px); }
  100%{ transform:translateY(0px); }
}

/* barra de xp */
.bar{
  height:12px;
  background:#374151;
  border-radius:10px;
  margin-top:10px;
}

.fill{
  height:100%;
  background:#22c55e;
}
</style>
</head>

<body>

<h1>⚔️ RPG DE GEOGRAFIA 2026 ⚔️</h1>

<p class="frase">HORA DE FARMAR SUA AURA!!!!!</p>

<p>Digite seu nome COMPLETO:</p>

<input id="busca" placeholder="Seu nome completo">
<br>
<button onclick="buscar()">Buscar</button>

<div id="resultado"></div>

<script>

let dados=[];

async function carregar(){
  try{
    const r = await fetch("dados.json?"+Date.now());
    dados = await r.json();
  }catch(e){
    document.body.innerHTML = "<h2>Erro ao carregar dados 😢</h2>";
    console.error(e);
  }
}

carregar();

function buscar(){

  if(dados.length === 0){
    resultado.innerHTML = "<p>Carregando dados... tente novamente</p>";
    return;
  }

  const nome = busca.value.toLowerCase();

  const aluno = dados.find(a =>
    a.nome.toLowerCase().includes(nome)
  );

  if(!aluno){
    resultado.innerHTML="<p>Aluno não encontrado</p>";
    return;
  }

  const pct = (aluno.xp/1000)*100;

  let classeNivel = "nivel1";

  if(aluno.nivel >= 5){
    classeNivel = "nivel5";
  } else if(aluno.nivel >= 4){
    classeNivel = "nivel4";
  } else if(aluno.nivel >= 3){
    classeNivel = "nivel3";
  } else if(aluno.nivel >= 2){
    classeNivel = "nivel2";
  }

  /* IMAGEM ESPECIAL */
  let imagemEspecial = "";

  if(aluno.nivel >= 2 && aluno.especial){
    imagemEspecial = `<img src="${aluno.especial}" class="especial">`;
  }

  resultado.innerHTML = `
    <div class="container">

      ${imagemEspecial}

      <div class="card ${classeNivel}">
        
        <img src="${aluno.foto ? aluno.foto : 'https://via.placeholder.com/100'}" class="foto">
        
        <h2>${aluno.nome}</h2>
        <p>${aluno.ano}º Ano</p>

        <h3>Nível ${aluno.nivel}</h3>

        <div class="bar">
          <div class="fill" style="width:${pct}%"></div>
        </div>

        <p>${aluno.xp} / 1000 XP</p>
      </div>

    </div>
  `;
}

</script>

</body>
</html>
