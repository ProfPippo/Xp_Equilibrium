<script>

async function carregar(){
  const r=await fetch("dados.json?"+Date.now());
  dados=await r.json();
}

carregar();

   NORMALIZAR TEXTO
========================= */
function normalizar(txt){
  return txt
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

      <div class="bar">
        <div class="fill" style="width:${pct}%"></div>
      </div>

      <p>${aluno.xp} / 1000 XP</p>
    </div>
  `;
}

/* =========================
   CORRIGIR CLIQUE
========================= */
function mostrar(nome){

  const aluno = dados.find(a => a.nome === nome);
  mostrarAluno(aluno);

}
